    <script>
        const codigos = {
            1: {
                titulo:"Código sencillo.txt", badge:"Principiante (Nivel 1)", color:"green",
                truco:"El Puente H es como un interruptor mágico que deja pasar la electricidad hacia adelante o hacia atrás para que las ruedas giren.",
                descripcion:"Aprenderemos a encender y apagar los motores usando comandos muy sencillos por el cable USB. Si mandas una 'a', ¡avanza! Si mandas una 'r', ¡retrocede! Y con una 'p', ¡se frena al instante!",
                codigo:`// Pines del puente H
const int motorA1 = 2;
const int motorA2 = 3;
const int motorB1 = 4;
const int motorB2 = 5;

void setup() {
  Serial.begin(9600);
  pinMode(motorA1, OUTPUT);
  pinMode(motorA2, OUTPUT);
  pinMode(motorB1, OUTPUT);
  pinMode(motorB2, OUTPUT);
  detener();
}

void loop() {
  if (Serial.available()) {
    char c = Serial.read();
    if (c == 'a') avanzar();
    if (c == 'r') retroceder();
    if (c == 'p') detener();
  }
}

void avanzar() {
  digitalWrite(motorA1, HIGH); digitalWrite(motorA2, LOW);
  digitalWrite(motorB1, HIGH); digitalWrite(motorB2, LOW);
}
void retroceder() {
  digitalWrite(motorA1, LOW); digitalWrite(motorA2, HIGH);
  digitalWrite(motorB1, LOW); digitalWrite(motorB2, HIGH);
}
void detener() {
  digitalWrite(motorA1, LOW); digitalWrite(motorA2, LOW);
  digitalWrite(motorB1, LOW); digitalWrite(motorB2, LOW);
}`
            },
            2: {
                titulo:"Código con mensajes.txt", badge:"Intermedio (Nivel 2)", color:"blue",
                truco:"Usamos 'toupper()' para convertir las letras a mayúsculas. Así no importa si escribes 'a' o 'A', ¡funcionará igual!",
                descripcion:"¡Tu robot ahora habla! Cada vez que le des una orden, el Arduino responderá al ordenador diciéndonos exactamente qué acción está realizando.",
                codigo:`// Pines del puente H
const int motorA1 = 2;
const int motorA2 = 3;
const int motorB1 = 4;
const int motorB2 = 5;

void setup() {
  Serial.begin(9600);
  pinMode(motorA1, OUTPUT); pinMode(motorA2, OUTPUT);
  pinMode(motorB1, OUTPUT); pinMode(motorB2, OUTPUT);
  detener();
}

void loop() {
  if (Serial.available()) {
    char c = Serial.read();
    c = toupper(c);
    if (c == 'A') avanzar();
    if (c == 'R') retroceder();
    if (c == 'P') detener();
  }
}

void avanzar() {
  digitalWrite(motorA1, HIGH); digitalWrite(motorA2, LOW);
  digitalWrite(motorB1, HIGH); digitalWrite(motorB2, LOW);
  Serial.println(">> Avanzando");
}
void retroceder() {
  digitalWrite(motorA1, LOW); digitalWrite(motorA2, HIGH);
  digitalWrite(motorB1, LOW); digitalWrite(motorB2, HIGH);
  Serial.println(">> Retrocediendo");
}
void detener() {
  digitalWrite(motorA1, LOW); digitalWrite(motorA2, LOW);
  digitalWrite(motorB1, LOW); digitalWrite(motorB2, LOW);
  Serial.println(">> Detenido");
}`
            },
            3: {
                titulo:"Código con sensor.txt", badge:"Experto (Nivel 3)", color:"purple",
                truco:"Utilizamos 'analogWrite(pin, velocidad)' para regular cuánta energía mandamos a los motores (de 0 a 255), como un pedal de acelerador real.",
                descripcion:"¡El modo definitivo! Velocidades variables, giros a izquierda y derecha, control Bluetooth y sensor ultrasónico que frena el coche si hay un obstáculo a menos de 5 cm.",
                codigo:`const int trigPin = 9;
const int echoPin = 10;
const int motorA1 = 2, motorA2 = 3;
const int motorB1 = 4, motorB2 = 5;

int vel1=120, vel2=180, vel3=255, velAtras=120;
int velActual = 150;
long duracion;
int distancia;

void setup() {
  pinMode(trigPin, OUTPUT); pinMode(echoPin, INPUT);
  pinMode(motorA1, OUTPUT); pinMode(motorA2, OUTPUT);
  pinMode(motorB1, OUTPUT); pinMode(motorB2, OUTPUT);
  Serial.begin(9600);
}

void loop() {
  digitalWrite(trigPin, LOW); delayMicroseconds(2);
  digitalWrite(trigPin, HIGH); delayMicroseconds(10);
  digitalWrite(trigPin, LOW);
  duracion = pulseIn(echoPin, HIGH);
  distancia = duracion * 0.034 / 2;

  Serial.print("Distancia: ");
  Serial.print(distancia);
  Serial.println(" cm");

  if (Serial.available()) {
    char c = Serial.read();
    if (c == '1') velActual = vel1;
    if (c == '2') velActual = vel2;
    if (c == '3') velActual = vel3;
    if (c == 'a') avanzar();
    if (c == 'p') detener();
    if (c == 'r') retroceder();
    if (c == 'i') izquierda();
    if (c == 'd') derecha();
  }

  if (distancia <= 5 && distancia > 0) detener();
}`
            }
        };

        let nivelActual=1, distanciaObstaculo=30, sensorActivo=false;
        window.onload = () => cambiarNivel(1);

        function cambiarNivel(nivel) {
            nivelActual = nivel;
            const d = codigos[nivel];
            document.getElementById("info-badge").innerText = d.badge;
            document.getElementById("info-title").innerText = d.titulo.replace(".txt","");
            document.getElementById("info-desc").innerText = d.descripcion;
            document.getElementById("info-trick").innerText = d.truco;
            document.getElementById("file-name-tab").innerText = d.titulo;
            document.getElementById("code-content").textContent = d.codigo;

            const card = document.getElementById("info-card");
            const icon = document.getElementById("info-icon");
            const badge = document.getElementById("info-badge");
            const title = document.getElementById("info-title");
            card.className = "p-6 rounded-3xl border-2 shadow-xl transition-all duration-300 ";
            icon.className = "text-4xl p-3 rounded-2xl ";
            badge.className = "border text-xs px-2.5 py-1 rounded-full font-bold uppercase ";

            const cfg = {
                1:{c:"green",ico:"🌱"}, 2:{c:"blue",ico:"💬"}, 3:{c:"purple",ico:"🦇"}
            }[nivel];
            card.classList.add(`from-${cfg.c}-900/40`,`to-slate-900`,`border-${cfg.c}-500/30`);
            icon.classList.add(`bg-${cfg.c}-500/20`,`text-${cfg.c}-400`); icon.innerText = cfg.ico;
            badge.classList.add(`bg-${cfg.c}-500/20`,`text-${cfg.c}-300`,`border-${cfg.c}-500/30`);
            title.className = `text-2xl font-black mt-2 text-${cfg.c}-400`;

            const sens = document.getElementById("sim-sensor-container");
            const speed = document.getElementById("sim-speed-container");
            const btnI = document.getElementById("btn-cmd-i");
            const btnD = document.getElementById("btn-cmd-d");

            if(nivel === 3) {
                sens.classList.remove("opacity-40"); speed.classList.remove("hidden");
                speed.style.display = "flex";
                btnI.disabled = false; btnD.disabled = false; sensorActivo = true;
                cambiarDistancia(document.getElementById("dist-slider").value);
            } else {
                sens.classList.add("opacity-40"); speed.classList.add("hidden");
                btnI.disabled = true; btnD.disabled = true; sensorActivo = false;
            }

            for(let i=1;i<=3;i++) {
                const b = document.getElementById(`btn-nivel-${i}`);
                if(i===nivel) {
                    b.className = `tab-btn p-3 rounded-xl transition-all duration-300 flex flex-col items-center gap-1 border-2 border-${cfg.c}-500 bg-${cfg.c}-500/10 text-${cfg.c}-400 shadow-lg`;
                } else {
                    b.className = "tab-btn p-3 rounded-xl transition-all duration-300 flex flex-col items-center gap-1 border-2 border-transparent hover:border-slate-700 text-slate-400 hover:text-slate-200";
                }
            }
            actuarFisico("DETENIDO");
            registrarConsola("Nivel cambiado a: " + d.badge);
        }

        function enviarComando(c) {
            let cmd = nivelActual===2 ? c.toUpperCase() : c;
            registrarConsola(`&gt; Enviando: '${cmd}'`);
            if(nivelActual===1) {
                if(cmd==='a') actuarFisico("AVANZANDO");
                if(cmd==='r') actuarFisico("RETROCEDIENDO");
                if(cmd==='p') actuarFisico("DETENIDO");
                if(cmd==='i'||cmd==='d') registrarConsola('<span class="text-red-400">[Error] Nivel 1 no tiene giros.</span>');
            } else if(nivelActual===2) {
                if(cmd==='A'){actuarFisico("AVANZANDO");registrarConsola('<span class="text-yellow-300">&gt;&gt; Avanzando</span>');}
                if(cmd==='R'){actuarFisico("RETROCEDIENDO");registrarConsola('<span class="text-yellow-300">&gt;&gt; Retrocediendo</span>');}
                if(cmd==='P'){actuarFisico("DETENIDO");registrarConsola('<span class="text-yellow-300">&gt;&gt; Detenido</span>');}
                if(cmd==='I'||cmd==='D') registrarConsola('<span class="text-red-400">[Error] ¡Sube al nivel 3 para girar!</span>');
            } else {
                if(cmd==='a'){
                    if(distanciaObstaculo<=5){registrarConsola('<span class="text-red-400">[Bloqueo] Obstáculo <= 5cm.</span>');actuarFisico("DETENIDO");}
                    else actuarFisico("AVANZANDO");
                }
                if(cmd==='p') actuarFisico("DETENIDO");
                if(cmd==='r') actuarFisico("RETROCEDIENDO");
                if(cmd==='i') actuarFisico("IZQUIERDA");
                if(cmd==='d') actuarFisico("DERECHA");
                if(cmd==='1') establecerVelocidad(1);
                if(cmd==='2') establecerVelocidad(2);
                if(cmd==='3') establecerVelocidad(3);
            }
        }

        function actuarFisico(estado) {
            const coche = document.getElementById("coche-robot");
            const st = document.getElementById("coche-status");
            const ri = document.getElementById("rueda-izq");
            const rd = document.getElementById("rueda-der");
            const ll = document.getElementById("led-l");
            const lr = document.getElementById("led-r");
            ri.className = "absolute -left-3 bottom-6 w-3 h-10 bg-slate-950 rounded-md";
            rd.className = "absolute -right-3 bottom-6 w-3 h-10 bg-slate-950 rounded-md";
            ri.style.animation = rd.style.animation = "none";
            coche.style.transform = "";
            ll.className = lr.className = "w-2 h-2 rounded-full bg-slate-600";
            st.innerText = estado;
            if(estado==="AVANZANDO"){
                st.className="bg-green-600 px-2 py-0.5 rounded text-[10px] font-bold text-white tracking-wider animate-pulse";
                ri.classList.add("animate-spin","border-green-400","border-t-2");
                rd.classList.add("animate-spin","border-green-400","border-t-2");
                coche.style.transform="translateY(-8px)";
                ll.className=lr.className="w-2 h-2 rounded-full bg-green-500 shadow-md shadow-green-400";
            } else if(estado==="RETROCEDIENDO"){
                st.className="bg-red-600 px-2 py-0.5 rounded text-[10px] font-bold text-white tracking-wider";
                ri.style.animation=rd.style.animation="spin 0.5s linear infinite reverse";
                coche.style.transform="translateY(8px)";
                ll.className=lr.className="w-2 h-2 rounded-full bg-red-500 shadow-md shadow-red-400";
            } else if(estado==="IZQUIERDA"){
                st.className="bg-yellow-600 px-2 py-0.5 rounded text-[10px] font-bold text-white tracking-wider";
                rd.style.animation="spin 0.3s linear infinite";
                coche.style.transform="rotate(-8deg)";
                ll.className="w-2 h-2 rounded-full bg-yellow-400 animate-ping";
            } else if(estado==="DERECHA"){
                st.className="bg-yellow-600 px-2 py-0.5 rounded text-[10px] font-bold text-white tracking-wider";
                ri.style.animation="spin 0.3s linear infinite";
                coche.style.transform="rotate(8deg)";
                lr.className="w-2 h-2 rounded-full bg-yellow-400 animate-ping";
            } else {
                st.className="bg-slate-950 px-2 py-0.5 rounded text-[10px] font-bold text-slate-400 tracking-wider";
            }
        }

        function establecerVelocidad(n) {
            for(let i=1;i<=3;i++) document.getElementById(`btn-vel-${i}`).className="px-3 py-1 bg-slate-800 text-xs rounded-lg text-slate-400 border border-slate-700 font-mono";
            const pwm=[0,120,180,255][n];
            const cls=["","bg-green-500/20 text-green-300 border-green-500/30","bg-blue-500/20 text-blue-300 border-blue-500/30","bg-purple-500/20 text-purple-300 border-purple-500/30"][n];
            document.getElementById(`btn-vel-${n}`).className=`px-3 py-1 text-xs rounded-lg border font-mono ${cls}`;
            registrarConsola(`&gt;&gt; PWM: <b>${pwm}</b>`);
        }

        function cambiarDistancia(val) {
            distanciaObstaculo = parseInt(val);
            document.getElementById("sim-dist-value").innerText = val + " cm";
            if(nivelActual===3) {
                registrarConsola(`Distancia: ${val} cm`);
                if(val<=5) {
                    document.getElementById("alerta-dist-txt").innerText=val;
                    document.getElementById("alerta-choque").classList.remove("hidden");
                    document.getElementById("alerta-choque").style.display="flex";
                    actuarFisico("DETENIDO");
                    registrarConsola(`<span class="text-red-400 font-bold">&gt;&gt; FRENO AUTOMÁTICO (${val} cm)</span>`);
                } else {
                    document.getElementById("alerta-choque").classList.add("hidden");
                    document.getElementById("alerta-choque").style.display="none";
                }
            }
        }

        function reiniciarSeguridad() {
            document.getElementById("dist-slider").value=30;
            cambiarDistancia(30);
        }

        function enviarInputManual() {
            const el=document.getElementById("serial-input");
            if(el.value.trim()) { enviarComando(el.value.trim().toLowerCase()); el.value=""; }
        }

        function copiarCodigo() {
            const ta=document.createElement("textarea");
            ta.value=document.getElementById("code-content").textContent;
            document.body.appendChild(ta); ta.select();
            try{ document.execCommand('copy');
                const b=document.getElementById("copy-btn-text"); b.innerText="¡Copiado!";
                b.classList.add("text-green-400");
                setTimeout(()=>{b.innerText="Copiar Código";b.classList.remove("text-green-400");},2000);
            }catch(e){}
            document.body.removeChild(ta);
        }

        function registrarConsola(msg) {
            const o=document.getElementById("console-output");
            const l=document.createElement("div"); l.innerHTML=msg; o.appendChild(l);
            o.scrollTop=o.scrollHeight;
        }

        function limpiarConsola() {
            document.getElementById("console-output").innerHTML='<div class="text-slate-500">&gt; Consola limpia. Conexión activa...</div>';
        }
    <\/script>
</body>
</html>
